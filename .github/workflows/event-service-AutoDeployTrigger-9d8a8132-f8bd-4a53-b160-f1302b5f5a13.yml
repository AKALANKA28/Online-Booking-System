name: Trigger auto deployment for event-service

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/event-service-AutoDeployTrigger-9d8a8132-f8bd-4a53-b160-f1302b5f5a13.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.EVENTSERVICE_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.EVENTSERVICE_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.EVENTSERVICE_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: onlineticketbooking.azurecr.io
          registryUsername: ${{ secrets.EVENTSERVICE_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.EVENTSERVICE_REGISTRY_PASSWORD }}
          containerAppName: event-service
          resourceGroup: online-booking-system
          imageToBuild: onlineticketbooking.azurecr.io/event-service:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_



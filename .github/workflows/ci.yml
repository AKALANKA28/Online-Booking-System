name: CI Pipeline

run-name: "${{ github.actor }} triggered CI for ${{ github.ref_name }}"

on:
  push:
    branches: [master, dev]
  pull_request:
    branches: [master, dev]

jobs:
  backend:
    name: Build and Scan Backend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: backend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workflow context
        run: |
          echo "Starting backend pipeline for branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Running on: ${{ runner.os }}"

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "21"
          cache: maven

      - name: Verify backend structure
        run: |
          echo "Checking backend workspace..."
          pwd
          ls -la
          echo "Verifying root Maven file..."
          test -f pom.xml
          echo "Backend structure looks good."

      - name: Build backend services
        run: |
          echo "Building all Spring Boot services..."
          mvn -B clean package -DskipTests
          echo "Backend build completed successfully."

      - name: Run backend tests
        run: |
          echo "Running backend tests..."
          mvn -B test
          echo "Backend tests completed."

      - name: Run SonarCloud analysis
        run: |
          echo "Running SonarCloud analysis..."
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar \
            -Dsonar.token=${{ secrets.SONAR_TOKEN }} \
            -Dsonar.host.url=https://sonarcloud.io
          echo "SonarCloud analysis completed."
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

      - name: Set up Snyk
        uses: snyk/actions/setup@master

      - name: Run Snyk security scan
        run: |
          echo "Running Snyk security scan..."
          snyk test --all-projects --severity-threshold=high
          echo "Snyk scan completed."
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload backend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: backend-jars
          path: |
            api-gateway/target/*.jar
            event-service/target/*.jar
            seat-service/target/*.jar
            booking-service/target/*.jar
            payment-notification-service/target/*.jar

      - name: Backend pipeline completed
        run: echo "Backend pipeline finished successfully."

  frontend:
    name: Build Frontend
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show workflow context
        run: |
          echo "Starting frontend pipeline for branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Triggered by event: ${{ github.event_name }}"
          echo "Running on: ${{ runner.os }}"

      - name: Set up Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Verify frontend structure
        run: |
          echo "Checking frontend workspace..."
          pwd
          ls -la
          echo "Verifying package.json..."
          test -f package.json
          echo "Frontend structure looks good."

      - name: Install frontend dependencies
        run: |
          echo "Installing frontend dependencies..."
          npm ci
          echo "Frontend dependencies installed."

      - name: Build frontend application
        run: |
          echo "Building Next.js frontend..."
          npm run build
          echo "Frontend build completed successfully."

      - name: Upload frontend artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            .next
            public
            package.json
            package-lock.json

      - name: Frontend pipeline completed
        run: echo "Frontend pipeline finished successfully."

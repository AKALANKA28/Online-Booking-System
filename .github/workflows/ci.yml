name: ci

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend:
    name: Backend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '21'
          cache: maven

      - name: Build backend
        run: mvn -B clean package -DskipTests

      - name: Run tests
        run: mvn -B test

      - name: Run SonarCloud analysis
        if: ${{ env.SONAR_TOKEN != '' }}
        run: >
          mvn -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar
          -Dsonar.token=${SONAR_TOKEN}
          -Dsonar.host.url=https://sonarcloud.io

      - name: Setup Snyk
        if: ${{ env.SNYK_TOKEN != '' }}
        uses: snyk/actions/setup@master

      - name: Run Snyk scan
        if: ${{ env.SNYK_TOKEN != '' }}
        run: snyk test --all-projects --severity-threshold=high
        env:
          SNYK_TOKEN: ${{ secrets.SNYK_TOKEN }}

      - name: Upload backend jars
        uses: actions/upload-artifact@v4
        with:
          name: backend-service-jars
          path: |
            backend/api-gateway/target/*.jar
            backend/event-service/target/*.jar
            backend/seat-service/target/*.jar
            backend/booking-service/target/*.jar
            backend/payment-notification-service/target/*.jar

  frontend:
    name: Frontend Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Install frontend dependencies
        run: npm ci

      - name: Build frontend
        run: npm run build

      - name: Upload frontend build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: frontend-build
          path: |
            frontend/.next
            frontend/package.json
            frontend/package-lock.json
            frontend/next.config.mjs
name: Deploy Payment Notification Service

run-name: "${{ github.actor }} deploying Payment Notification Service from ${{ github.ref_name }}"

on:
  push:
    branches: [master]
    paths:
      - 'backend/payment-notification-service/**'
      - 'backend/pom.xml'
      - '.github/workflows/deploy-payment-notification-service.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Show deployment context
        run: |
          echo "Starting deployment for Payment Notification Service"
          echo "Branch: ${{ github.ref_name }}"
          echo "Repository: ${{ github.repository }}"
          echo "Triggered by: ${{ github.event_name }}"

      - name: Log in to Azure
        uses: azure/login@v2
        with:
          creds: ${{ secrets.AZURE_CREDENTIALS }}

      - name: Build and deploy Payment Notification Service
        uses: azure/container-apps-deploy-action@v1
        with:
          appSourcePath: ${{ github.workspace }}/backend
          dockerfilePath: payment-notification-service/Dockerfile
          acrName: ${{ secrets.ACR_NAME }}
          containerAppName: payment-notification-service
          resourceGroup: ${{ secrets.AZURE_RESOURCE_GROUP }}
          containerAppEnvironment: ${{ secrets.AZURE_CONTAINERAPPS_ENV }}
          imageToBuild: ${{ secrets.ACR_NAME }}.azurecr.io/payment-notification-service:${{ github.sha }}
          disableTelemetry: true

      - name: Deployment complete
        run: echo "Payment Notification Service deployed successfully."

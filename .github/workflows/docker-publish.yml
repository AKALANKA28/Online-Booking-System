name: docker-publish

on:
  workflow_dispatch:
  push:
    branches: [ main ]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push gateway
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./api-gateway/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ticketing-api-gateway:latest

      - name: Build and push event service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./event-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ticketing-event-service:latest

      - name: Build and push seat service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./seat-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ticketing-seat-service:latest

      - name: Build and push booking service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./booking-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ticketing-booking-service:latest

      - name: Build and push payment notification service
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./payment-notification-service/Dockerfile
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/ticketing-payment-notification-service:latest

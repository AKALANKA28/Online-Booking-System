server:
  port: ${SERVER_PORT:8084}

debug: ${APP_DEBUG:true}

spring:
  application:
    name: payment-notification-service
  datasource:
    url: ${PAYMENT_DB_URL:jdbc:postgresql://localhost:5436/paymentdb}
    username: ${PAYMENT_DB_USERNAME:ticketing}
    password: ${PAYMENT_DB_PASSWORD:ticketing}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  rabbitmq:
    host: ${SPRING_RABBITMQ_HOST:localhost}
    port: ${SPRING_RABBITMQ_PORT:5672}
    username: ${SPRING_RABBITMQ_USERNAME:guest}
    password: ${SPRING_RABBITMQ_PASSWORD:guest}

app:
  rabbitmq:
    exchange: ticketing.events
    confirmed-queue: payment.booking.confirmed.queue
    failed-queue: payment.booking.failed.queue
  security:
    internal-api-key: ${INTERNAL_API_KEY:internal-demo-secret}
  integrations:
    stripe:
      secret-key: ${STRIPE_SECRET_KEY:}
      webhook-secret: ${STRIPE_WEBHOOK_SECRET:}
      currency: ${STRIPE_CURRENCY:usd}
    sendgrid:
      api-key: ${SENDGRID_API_KEY:}
      from-email: ${SENDGRID_FROM_EMAIL:}
      from-name: ${SENDGRID_FROM_NAME:Ticketing}
    twilio:
      account-sid: ${TWILIO_ACCOUNT_SID:}
      auth-token: ${TWILIO_AUTH_TOKEN:}
      from-number: ${TWILIO_FROM_NUMBER:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

springdoc:
  swagger-ui:
    path: /swagger-ui.html

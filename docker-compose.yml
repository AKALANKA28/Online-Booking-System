services:
  rabbitmq:
    image: rabbitmq:3.13-management
    container_name: rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: ${RABBITMQ_DEFAULT_USER:-guest}
      RABBITMQ_DEFAULT_PASS: ${RABBITMQ_DEFAULT_PASS:-guest}
    ports:
      - "5672:5672"
      - "15672:15672"

  postgres-event:
    image: postgres:16
    container_name: postgres-event
    environment:
      POSTGRES_DB: eventdb
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5433:5432"
    volumes:
      - event-db-data:/var/lib/postgresql/data

  postgres-seat:
    image: postgres:16
    container_name: postgres-seat
    environment:
      POSTGRES_DB: seatdb
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5434:5432"
    volumes:
      - seat-db-data:/var/lib/postgresql/data

  postgres-booking:
    image: postgres:16
    container_name: postgres-booking
    environment:
      POSTGRES_DB: bookingdb
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5435:5432"
    volumes:
      - booking-db-data:/var/lib/postgresql/data

  postgres-payment:
    image: postgres:16
    container_name: postgres-payment
    environment:
      POSTGRES_DB: paymentdb
      POSTGRES_USER: ticketing
      POSTGRES_PASSWORD: ticketing
    ports:
      - "5436:5432"
    volumes:
      - payment-db-data:/var/lib/postgresql/data

  event-service:
    build:
      context: .
      dockerfile: event-service/Dockerfile
    container_name: event-service
    depends_on:
      - postgres-event
      - rabbitmq
    environment:
      SERVER_PORT: 8081
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-event:5432/eventdb
      SPRING_DATASOURCE_USERNAME: ticketing
      SPRING_DATASOURCE_PASSWORD: ticketing
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      JWT_SECRET: ${JWT_SECRET:-demo-demo-demo-demo-demo-demo-demo-12345}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-demo-secret}
    ports:
      - "8081:8081"

  seat-service:
    build:
      context: .
      dockerfile: seat-service/Dockerfile
    container_name: seat-service
    depends_on:
      - postgres-seat
      - rabbitmq
    environment:
      SERVER_PORT: 8082
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-seat:5432/seatdb
      SPRING_DATASOURCE_USERNAME: ticketing
      SPRING_DATASOURCE_PASSWORD: ticketing
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-demo-secret}
    ports:
      - "8082:8082"

  booking-service:
    build:
      context: .
      dockerfile: booking-service/Dockerfile
    container_name: booking-service
    depends_on:
      - postgres-booking
      - rabbitmq
      - seat-service
      - payment-notification-service
    environment:
      SERVER_PORT: 8083
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-booking:5432/bookingdb
      SPRING_DATASOURCE_USERNAME: ticketing
      SPRING_DATASOURCE_PASSWORD: ticketing
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-demo-secret}
      SERVICES_SEAT_BASE_URL: http://seat-service:8082
      SERVICES_PAYMENT_BASE_URL: http://payment-notification-service:8084
    ports:
      - "8083:8083"

  payment-notification-service:
    build:
      context: .
      dockerfile: payment-notification-service/Dockerfile
    container_name: payment-notification-service
    depends_on:
      - postgres-payment
      - rabbitmq
    environment:
      SERVER_PORT: 8084
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres-payment:5432/paymentdb
      SPRING_DATASOURCE_USERNAME: ticketing
      SPRING_DATASOURCE_PASSWORD: ticketing
      SPRING_RABBITMQ_HOST: rabbitmq
      SPRING_RABBITMQ_PORT: 5672
      SPRING_RABBITMQ_USERNAME: ${RABBITMQ_DEFAULT_USER:-guest}
      SPRING_RABBITMQ_PASSWORD: ${RABBITMQ_DEFAULT_PASS:-guest}
      INTERNAL_API_KEY: ${INTERNAL_API_KEY:-internal-demo-secret}
      # Optional — see docs/INTEGRATIONS.md (omit for built-in simulator + log-only notifications)
      STRIPE_SECRET_KEY: ${STRIPE_SECRET_KEY:-}
      STRIPE_WEBHOOK_SECRET: ${STRIPE_WEBHOOK_SECRET:-}
      STRIPE_CURRENCY: ${STRIPE_CURRENCY:-usd}
      SENDGRID_API_KEY: ${SENDGRID_API_KEY:-}
      SENDGRID_FROM_EMAIL: ${SENDGRID_FROM_EMAIL:-}
      SENDGRID_FROM_NAME: ${SENDGRID_FROM_NAME:-Ticketing}
      TWILIO_ACCOUNT_SID: ${TWILIO_ACCOUNT_SID:-}
      TWILIO_AUTH_TOKEN: ${TWILIO_AUTH_TOKEN:-}
      TWILIO_FROM_NUMBER: ${TWILIO_FROM_NUMBER:-}
    ports:
      - "8084:8084"

  api-gateway:
    build:
      context: .
      dockerfile: api-gateway/Dockerfile
    container_name: api-gateway
    depends_on:
      - event-service
      - seat-service
      - booking-service
      - payment-notification-service
    environment:
      SERVER_PORT: 8080
      JWT_SECRET: ${JWT_SECRET:-demo-demo-demo-demo-demo-demo-demo-12345}
      EVENT_SERVICE_URL: http://event-service:8081
      SEAT_SERVICE_URL: http://seat-service:8082
      BOOKING_SERVICE_URL: http://booking-service:8083
      PAYMENT_SERVICE_URL: http://payment-notification-service:8084
    ports:
      - "8080:8080"

volumes:
  event-db-data:
  seat-db-data:
  booking-db-data:
  payment-db-data:
